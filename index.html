<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="前端开发者作品集 - 专注现代 Web 交互与视觉实现">
  <title>Portfolio | 前端开发者</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <!-- 滚动进度条 -->
  <div class="scroll-progress" id="scrollProgress"></div>

  <!-- 导航 -->
  <header class="header" id="header">
    <div class="container header-inner">
      <a href="#home" class="logo" data-nav>
        <span class="logo-bracket">&lt;</span>Dev<span class="logo-bracket">/&gt;</span>
      </a>
      
      <nav class="nav" id="nav">
        <a href="#home" class="nav-link active" data-nav>首页</a>
        <a href="#about" class="nav-link" data-nav>关于</a>
        <a href="#projects" class="nav-link" data-nav>项目</a>
        <a href="#experience" class="nav-link" data-nav>经历</a>
        <a href="#contact" class="nav-link" data-nav>联系</a>
      </nav>

      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button class="menu-toggle" id="menuToggle" aria-label="菜单">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main" id="main">
    <!-- 页面容器由 JS 动态渲染 -->
  </main>

  <!-- Back to Top -->
  <button class="back-to-top" id="backToTop" aria-label="回到顶部">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <!-- Toast 通知 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/animations.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
